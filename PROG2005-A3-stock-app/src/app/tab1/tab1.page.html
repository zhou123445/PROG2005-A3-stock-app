<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Inventory List</ion-title>
    <!-- Help Button (HD Requirement) -->
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon name="help-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Search Bar -->
  <ion-searchbar
    [(ngModel)]="searchTerm"
    (ionInput)="filterItems()"
    placeholder="Search by item name"
  ></ion-searchbar>

  <!-- Inventory Item List -->
  <ion-list>
    <ion-item *ngFor="let item of filteredItems">
      <ion-label>
        <h2>{{ item.item_name }}</h2>
        <p>Category: {{ item.category }}</p>
        <p>Stock: {{ item.quantity }} | Status: {{ item.stock_status }}</p>
        <p>Price: ${{ item.price }}</p>
      </ion-label>
      <!-- Featured Item Badge -->
      <ion-badge *ngIf="item.featured_item === 1" color="warning">Featured</ion-badge>
    </ion-item>
  </ion-list>
</ion-content>
