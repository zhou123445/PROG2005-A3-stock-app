<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Add New Item</ion-title>
    <!-- 无帮助按钮 -->
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-label position="stacked">Item Name *</ion-label>
      <ion-input [(ngModel)]="itemName" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Category *</ion-label>
      <ion-select [(ngModel)]="category">
        <ion-select-option *ngFor="let c of categories" [value]="c">
          {{ c }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Quantity *</ion-label>
      <ion-input type="number" [(ngModel)]="quantity" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Price *</ion-label>
      <ion-input type="number" step="0.01" [(ngModel)]="price" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Supplier Name *</ion-label>
      <ion-input [(ngModel)]="supplierName" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Stock Status *</ion-label>
      <ion-select [(ngModel)]="stockStatus">
        <ion-select-option *ngFor="let s of stockStatuses" [value]="s">
          {{ s }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Featured Item (1=Yes, 0=No)</ion-label>
      <ion-input type="number" [(ngModel)]="featuredItem"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Special Note</ion-label>
      <ion-input [(ngModel)]="specialNote"></ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding">
    <ion-button 
      expand="block" 
      color="success" 
      (click)="addItem()"
      [disabled]="submitting">
      {{ submitting ? 'Saving...' : 'Add Item' }}
    </ion-button>

    <ion-button expand="block" color="medium" (click)="resetForm()">
      Clear Form
    </ion-button>
  </div>
</ion-content>
